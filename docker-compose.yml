services:
  news-notifier:
    build: . # 👈 This tells Portainer to look for the Dockerfile in your Git repo
    container_name: daily_news_bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - TZ=${TZ}
