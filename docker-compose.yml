services:
  news-notifier:
    build: . # 👈 This tells Portainer to look for the Dockerfile in your Git repo
    container_name: daily_news_bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - FREENEWS_API_KEY=${FREENEWS_API_KEY}
      - FREEN_EWS_API_KEY=${FREEN_EWS_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - FINHUB_API_KEY=${FINHUB_API_KEY}
      - NEWS_FETCH_PRIORITY=${NEWS_FETCH_PRIORITY}
      - FREENEWS_API_URL=${FREENEWS_API_URL}
      - FINNHUB_API_URL=${FINNHUB_API_URL}
      - TZ=${TZ}
      - YF_NO_CURL_CFFI=1 # 👈 FORCE DEACTIVATION HERE
